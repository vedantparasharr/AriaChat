<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
</head>

<body>
    <div class="js-container"></div>

    <!-- ===== LOAD REACT LIBRARIES ===== -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        async function getGeminiResponse(prompt) {
            const API_KEY = "AIzaSyAdrWLLmLREofcIAlmYQ-iZs2gAFaPuMAg";
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY;

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
        }


        // ===== CHATBOT INPUT =====
        function ChatInput({ chatMessages, setChatMessages }) {

            // ===== INPUT STATE =====
            const [inputText, setInputText] = React.useState('')

            // ===== SAVE INPUT TEXT =====
            function saveInputText(event) {
                setInputText(event.target.value)
            }

            // ===== SEND MESSAGE =====
            async function sendMessage() {
                if (!inputText.trim()) return;

                const newChatMessages = [
                    ...chatMessages, {
                        message: inputText, sender: 'user', id: crypto.randomUUID()
                    }
                ]
                setChatMessages(newChatMessages)

                try {
                    const response = await getGeminiResponse(inputText);
                    setChatMessages([
                        ...newChatMessages, {
                            message: response, sender: 'bot', id: crypto.randomUUID()
                        }
                    ]);
                } catch (error) {
                    console.log(error);
                    setChatMessages([
                        ...newChatMessages,
                        { message: "Sorry, I couldn't get a response right now.", sender: 'bot', id: crypto.randomUUID() }
                    ]);
                }

                setInputText('');
            }

            // ===== INPUT + BUTTON =====
            return (
                <>
                    <input
                        type="text"
                        placeholder="Send a message"
                        size="30"
                        onChange={saveInputText}
                        value={inputText}

                    />
                    <button onClick={sendMessage}>Send</button>
                </>
            )
        }

        // ===== CHAT MESSAGE =====
        function ChatMessage({ message, sender }) {

            // ===== DISPLAY MESSAGE + IMAGE BASED ON SENDER =====
            return (
                <div>
                    {sender === 'bot' && (
                        <img src="assets/images/robot.png"
                            alt="user profile picture"
                            width="35"
                        />
                    )}
                    {message}
                    {sender === 'user' && (
                        <img src="assets/images/user.png"
                            alt="user profile picture"
                            width="35"
                        />
                    )}
                </div>
            )
        }

        // ===== CHAT MESSAGES =====
        function ChatMessages({ chatMessages }) {

            // ===== LOOP THROUGH ALL MESSAGES =====
            return (
                <>
                    {chatMessages.map((chatMessage) => {
                        return (
                            <ChatMessage
                                message={chatMessage.message}
                                sender={chatMessage.sender}
                                key={chatMessage.id}
                            />
                        )
                    })}
                </>
            )
        }

        // ===== RENDER APPLICATION =====
        function App() {

            // ===== CHAT MESSAGES STATE =====
            const [chatMessages, setChatMessages] = React.useState([

            ]);

            // ===== COMBINE ALL COMPONENTS =====
            return (
                <>
                    <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages} />
                    <ChatMessages chatMessages={chatMessages} />
                </>
            )
        }

        // ===== CREATE ROOT & RENDER APP =====
        const htmlContainer = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(htmlContainer);
        root.render(<App />);

    </script>
</body>

</html>
